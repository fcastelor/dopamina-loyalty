<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- Security Headers -->
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
<meta http-equiv="X-XSS-Protection" content="1; mode=block">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()">
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self' https://dopamina-loyalty.vercel.app;
  script-src 'self' 'unsafe-inline'
    https://cdnjs.cloudflare.com
    https://cdn.jsdelivr.net
    https://fonts.googleapis.com;
  style-src 'self' 'unsafe-inline'
    https://fonts.googleapis.com;
  font-src 'self'
    https://fonts.gstatic.com;
  img-src 'self' data: blob:
    https://cuofpfajzeyezerubytc.supabase.co;
  connect-src 'self'
    https://cuofpfajzeyezerubytc.supabase.co
    wss://cuofpfajzeyezerubytc.supabase.co;
  frame-ancestors 'none';
  base-uri 'self';
  form-action 'none';
">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5e6c8">
<title>Mi Tarjeta Dopamina</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(160deg,#f5e0b0 0%,#e8cc90 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;font-family:'Nunito',sans-serif;padding:20px 16px 32px;overflow-x:hidden}
#loader{position:fixed;inset:0;background:linear-gradient(160deg,#f5e0b0,#e8cc90);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .6s ease}
#loader.hide{opacity:0;pointer-events:none}
.loader-logo{font-family:'Baloo 2',sans-serif;font-size:36px;font-weight:800;color:#5c3317;margin-bottom:20px}
.loader-dots{display:flex;gap:10px}
.loader-dot{width:10px;height:10px;background:#8B4513;border-radius:50%;animation:ldot .7s ease-in-out infinite alternate}
.loader-dot:nth-child(2){animation-delay:.2s;background:#F5C842}
.loader-dot:nth-child(3){animation-delay:.4s;background:#5c3317}
@keyframes ldot{to{transform:translateY(-14px);opacity:.4}}
.scene{width:min(360px,100%);perspective:1400px;cursor:pointer;margin-bottom:12px}
.card-flip{width:100%;aspect-ratio:840/1460;position:relative;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.4,0,.2,1)}
.card-flip.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;overflow:hidden;box-shadow:0 24px 64px rgba(92,51,23,.28),0 8px 24px rgba(92,51,23,.15)}
.card-back-face{transform:rotateY(180deg)}
/* ── ANVERSO REDISEÑADO ── */
.front-bg{width:100%;height:100%;position:relative;overflow:hidden;background:#f5e0b0}
/* Imagen real como fondo full */
.front-bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
/* Sellos sobre el waffle del anverso */
.front-sellos-layer{position:absolute;inset:0;pointer-events:none;z-index:2}
.front-sello{position:absolute;width:9%;aspect-ratio:1;border-radius:20%;display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);transition:all .5s cubic-bezier(.34,1.56,.64,1)}
.front-sello.activo{background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 2px 10px rgba(34,197,94,.6);font-size:min(4vw,15px)}
.front-sello.vacio{background:rgba(255,255,255,.15);border:1.5px dashed rgba(255,255,255,.5)}
/* Overlay solo en la franja inferior — exactamente sobre el área del nombre */
.front-overlay{
  position:absolute;bottom:0;left:0;right:0;height:20%;
  background:linear-gradient(to bottom,
    rgba(26,15,5,0) 0%,
    rgba(26,15,5,.88) 50%,
    rgba(26,15,5,.97) 100%
  );
  z-index:3;
}
/* Logo esquina dorada */
.gold-corner{position:absolute;top:0;left:0;z-index:5;width:38%;height:20%;background:#F5C842;clip-path:ellipse(100% 100% at 0% 0%);display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;padding:5% 5% 0 5%}
.logo-txt{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:clamp(16px,6vw,24px);color:#5c3317;line-height:1}
.logo-sub{font-size:clamp(6px,2vw,9px);color:#7a4a1a;font-weight:600;margin-top:1px}
/* Contenido bottom — solo Dopilover + Nombre */
.front-bottom{position:absolute;bottom:0;left:0;right:0;z-index:4;padding:0 7% 3%;display:flex;flex-direction:column;align-items:center;text-align:center;}
.dopilover-lbl{
  font-size:clamp(9px,3vw,13px);color:rgba(255,220,150,.85);
  font-weight:700;letter-spacing:1px;text-transform:uppercase;
  margin-bottom:3px;
}
.cliente-nom{
  font-family:'Baloo 2',sans-serif;
  font-size:clamp(18px,7vw,28px);
  font-weight:800;color:white;
  line-height:1;
  text-shadow:0 2px 8px rgba(0,0,0,.8);
}
.back-bg{width:100%;height:100%;position:relative;background:#f5e6c8}
.back-img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
.sellos-layer{position:absolute;inset:0;pointer-events:none}
.sello-pos{position:absolute;width:9.5%;aspect-ratio:1;border-radius:22%;display:flex;align-items:center;justify-content:center;transition:all .5s cubic-bezier(.34,1.56,.64,1)}
.sello-pos.activo{background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 3px 12px rgba(34,197,94,.5);font-size:min(5vw,18px)}
.sello-pos.vacio{background:rgba(255,255,255,.1);border:1.5px dashed rgba(255,255,255,.4)}
/* Badges puntos/sellos como overlay inferior */
.back-badges{
  position:absolute;bottom:4%;left:0;right:0;
  display:flex;gap:8px;justify-content:center;
  z-index:10;
}
/* Nueva zona inferior reverso: QR a la izquierda + badges a la derecha */
.back-bottom{
  position:absolute;bottom:3%;left:0;right:0;
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:0 6%;z-index:10;
}
.back-qr-wrap{
  background:white;border-radius:12px;padding:6px;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
  display:flex;flex-direction:column;align-items:center;flex-shrink:0;
}
.back-qr-lbl{font-size:7px;color:#5c3317;font-weight:700;margin-top:3px;letter-spacing:.4px;text-align:center}
.back-badges-col{display:flex;flex-direction:column;gap:6px}
.back-nombre{position:absolute;top:2%;left:50%;transform:translateX(-50%);font-family:'Baloo 2',sans-serif;font-size:clamp(10px,3.5vw,14px);font-weight:800;color:#5c3317;white-space:nowrap;background:rgba(245,232,192,.92);border-radius:20px;padding:3px 12px;backdrop-filter:blur(4px);z-index:10;box-shadow:0 2px 8px rgba(92,51,23,.15);max-width:90%;overflow:hidden;text-overflow:ellipsis}
.flip-hint{font-size:12px;color:rgba(92,51,23,.6);display:flex;align-items:center;gap:5px;font-weight:600;margin-top:8px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.flip-hint svg{width:14px;height:14px}
.info-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.chip{background:rgba(92,51,23,.12);border-radius:20px;padding:6px 14px;font-size:12px;color:#5c3317;font-weight:700;display:flex;align-items:center;gap:5px}
.chip.win{background:#dcfce7;color:#166534}
.install-btn{margin-top:16px;background:#5c3317;color:white;border:none;padding:14px 28px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(92,51,23,.3);transition:transform .2s}
.install-btn:active{transform:scale(.96)}
#error-view{display:none;text-align:center;padding:40px 20px}
#error-view h2{font-family:'Baloo 2',sans-serif;font-size:24px;color:#5c3317;margin-bottom:8px}
#error-view p{color:#8B4513;font-size:14px}
</style>
</head>
<body>
<div id="loader">
  <div class="loader-logo">Dopamina</div>
  <div class="loader-dots">
    <div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div>
  </div>
</div>
<div id="error-view"><h2>Tarjeta no encontrada</h2><p>El enlace no es válido.</p></div>
<div class="scene" id="card-scene" style="display:none" onclick="flipCard()">
  <div class="card-flip" id="card-flip">
    <!-- ANVERSO -->
    <div class="card-face">
      <div class="front-bg">

        <!-- Imagen real como fondo completo -->
        <img class="front-bg-img"
          src="https://cuofpfajzeyezerubytc.supabase.co/storage/v1/object/public/fotos-clientes/card_frontal.png"
          alt="Tarjeta Dopamina">

        <!-- Sellos sobre las celdas del waffle -->
        <div class="front-sellos-layer" id="front-sellos-layer"></div>

        <!-- Overlay gradiente en la parte inferior para legibilidad del texto -->
        <div class="front-overlay"></div>

        <!-- CONTENIDO: solo Dopilover + Nombre -->
        <div class="front-bottom">
          <div class="dopilover-lbl" id="card-num">Dopilover #0000</div>
          <div class="cliente-nom" id="cliente-nombre">—</div>
        </div>

      </div>
    </div>
    <!-- REVERSO -->
    <div class="card-face card-back-face">
      <div class="back-bg">
        <!-- Imagen real completa -->
        <img class="back-img" src="https://cuofpfajzeyezerubytc.supabase.co/storage/v1/object/public/fotos-clientes/card_reverso.png" alt="Tarjeta Dopamina">
        <!-- Nombre del cliente arriba -->
        <div class="back-nombre" id="back-nombre">—</div>
        <!-- Sellos sobre el waffle -->
        <div class="sellos-layer" id="sellos-layer"></div>
        <!-- QR + badges en la parte inferior -->
        <div class="back-bottom">
          <div class="back-qr-wrap">
            <div id="qr-code-back"></div>
            <div class="back-qr-lbl">📷 ESCANEAR EN LA APP</div>
          </div>
          <div class="back-badges-col">
            <div class="qr-badge">
              <div class="qr-badge-num" id="puntos-num">0</div>
              <div class="qr-badge-lbl">PUNTOS</div>
            </div>
            <div class="qr-badge verde">
              <div class="qr-badge-num" id="sellos-num">0/10</div>
              <div class="qr-badge-lbl">SELLOS ☕</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="flip-hint" id="flip-hint" style="display:none">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
  Toca la tarjeta para ver el reverso
</div>
<div class="info-bar" id="info-bar" style="display:none">
  <div class="chip">📅 <span id="chip-visitas">0 visitas</span></div>
  <div class="chip">☕ <span id="chip-sellos">0/10 sellos</span></div>
  <div class="chip win" id="chip-gratis" style="display:none">🎁 ¡Consumo gratis!</div>
</div>
<button class="install-btn" id="install-btn" style="display:none" onclick="installPWA()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M12 16l-4-4h3V4h2v8h3l-4 4z"/><rect x="4" y="18" width="16" height="2" rx="1"/></svg>
  Agregar a mi pantalla
</button>
<script>
const SBURL='https://cuofpfajzeyezerubytc.supabase.co';
const SBKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1b2ZwZmFqemV5ZXplcnVieXRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzU1MTMsImV4cCI6MjA5MDExMTUxM30.5Tog6Ata3CbYflwxOhezXZegrwagiboQF2u0fVX9oZ4';
const SB=supabase.createClient(SBURL,SBKEY);
(function(){const g=document.getElementById('dpm-grid');if(g)for(let i=0;i<28;i++){const d=document.createElement('div');d.className='dpm-cell';d.textContent='DpM';g.appendChild(d);}})();
function getClienteId(){const p=new URLSearchParams(window.location.search);return p.get('id')||p.get('c');}
function flipCard(){document.getElementById('card-flip').classList.toggle('flipped');}
// Posiciones de sellos calibradas sobre la imagen real
// Fila 1 (4 sellos): ~34% top
// Fila 2 (2 sellos laterales, frutillas tapan centro): ~47% top
// Fila 3 (4 sellos): ~60% top
const SELLO_POS=[
  {l:'18%',t:'33%'},{l:'33%',t:'33%'},{l:'52%',t:'33%'},{l:'67%',t:'33%'},
  {l:'18%',t:'46%'},{l:'67%',t:'46%'},
  {l:'18%',t:'59%'},{l:'33%',t:'59%'},{l:'52%',t:'59%'},{l:'67%',t:'59%'}
];
// Posiciones calibradas sobre la imagen real (806x1354)
// Las celdas del waffle empiezan DEBAJO del capibara
// Fila 1: y~540px (39.9% del alto de la imagen)
// Fila 2: y~700px (51.7%) — solo laterales, frutillas en centro
// Fila 3: y~940px (69.4%) — fila inferior con "5%"/"SORPRESA"
const SELLO_POS_FRENTE=[
  // Fila 1 — 4 celdas superiores del waffle
  {l:'20%',t:'40%'},{l:'40%',t:'40%'},
  {l:'60%',t:'40%'},{l:'80%',t:'40%'},
  // Fila 2 — solo laterales (frutillas en centro)
  {l:'20%',t:'50%'},{l:'80%',t:'50%'},
  // Fila 3 — 4 celdas inferiores
  {l:'20%',t:'60%'},{l:'40%',t:'60%'},
  {l:'60%',t:'60%'},{l:'80%',t:'60%'},
];

function renderSellosFrente(activos,max){
  const layer=document.getElementById('front-sellos-layer');
  if(!layer)return;
  layer.innerHTML='';
  const n=Math.min(max,10);
  SELLO_POS_FRENTE.slice(0,n).forEach((pos,i)=>{
    const div=document.createElement('div');
    div.className='front-sello '+(i<activos?'activo':'vacio');
    div.style.left=pos.l;div.style.top=pos.t;
    div.style.transitionDelay=(i*.06)+'s';
    if(i<activos)div.textContent='✅';
    layer.appendChild(div);
  });
}

function renderSellos(activos,max){
  // Reverso
  const layer=document.getElementById('sellos-layer');
  if(layer){
    layer.innerHTML='';
    const n=Math.min(max,10);
    SELLO_POS.slice(0,n).forEach((pos,i)=>{
      const div=document.createElement('div');
      div.className='sello-pos '+(i<activos?'activo':'vacio');
      div.style.left=pos.l;div.style.top=pos.t;
      if(i<activos){div.textContent='✅';div.style.transitionDelay=(i*.06)+'s';}
      layer.appendChild(div);
    });
  }
  // Anverso
  renderSellosFrente(activos,max);
}
function genQR(url){
  // QR solo en el reverso
  const el=document.getElementById('qr-code-back');
  if(!el)return;
  el.innerHTML='';
  const cardW=document.querySelector('.scene')?.offsetWidth||300;
  const qrSize=Math.max(Math.min(Math.floor(cardW*0.5),160),130);
  try{new QRCode(el,{text:url,width:qrSize,height:qrSize,colorDark:'#5c3317',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});}catch(e){}
}
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-btn').style.display='flex';});
function installPWA(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;document.getElementById('install-btn').style.display='none';}else alert('Menú del navegador → "Agregar a pantalla de inicio"');}
async function init(){
  const id=getClienteId();
  if(!id){document.getElementById('loader').classList.add('hide');document.getElementById('error-view').style.display='block';return;}
  try{
    const[{data:c,error:ce},{data:cfg}]=await Promise.all([
      SB.from('clientes').select('*').eq('id',id).single(),
      SB.from('config').select('*').single()
    ]);
    if(ce||!c)throw new Error('no cliente');
    const sellosMax=cfg?.sellos_meta||10;
    const sellos=c.sellos_activos||0;
    const visitas=c.visitas||0;
    const nombre=c.nombre?.split(' ')[0]||c.nombre||'Cliente';
    document.getElementById('cliente-nombre').textContent=nombre;
    // Anverso: solo Dopilover + nombre + redes
    document.getElementById('card-num').textContent=(cfg?.tarjeta_miembro_label||'Dopilover')+' #'+String(c.id).padStart(4,'0');
    const redesEl=document.getElementById('card-redes');
    if(redesEl){
      try{
        const raw=cfg?.tarjeta_redes;
        const redesSelec=raw?(typeof raw==='string'?JSON.parse(raw):raw):null;
        const lista=redesSelec&&redesSelec.length?redesSelec:[{red:'instagram',icono:'📸'},{red:'tiktok',icono:'🎵'}];
        // Mapear cada red a su valor en config
        const vals={
          instagram:cfg?.instagram,tiktok:cfg?.tiktok,facebook:cfg?.facebook,
          youtube:cfg?.youtube,twitter:cfg?.twitter,linkedin:cfg?.linkedin,
          web:cfg?.web,whatsapp:cfg?.delivery_tel,delivery_tel:cfg?.delivery_tel
        };
        const labels={
          instagram:'Instagram',tiktok:'TikTok',facebook:'Facebook',
          youtube:'YouTube',twitter:'X',linkedin:'LinkedIn',
          web:'Web',whatsapp:'WhatsApp',delivery_tel:'Delivery'
        };
        redesEl.innerHTML=lista
          .filter(r=>vals[r.red])
          .map(r=>`${r.icono} ${labels[r.red]||r.red}: ${vals[r.red]}`)
          .join('<br>');
      }catch(e){
        redesEl.innerHTML=`📸 ${cfg?.instagram||'@dopamina.pee'}<br>🎵 ${cfg?.tiktok||'Dopamina.pee'}`;
      }
    }
    // Imagen de tarjeta dinámica
    const backImg=document.querySelector('.back-img');
    if(backImg&&cfg?.card_reverso_url)backImg.src=cfg.card_reverso_url;
    document.getElementById('back-nombre').textContent=nombre+' · #'+String(c.id).padStart(4,'0');
    document.getElementById('puntos-num').textContent=(c.puntos||0).toLocaleString();
    // Nuevos elementos del reverso rediseñado
    const miembroLabel=cfg?.tarjeta_miembro_label||'Dopilover';
    const sellosEl=document.getElementById('sellos-num');
    if(sellosEl)sellosEl.textContent=(c.sellos_activos||0)+'/'+sellosMax;
    renderSellos(sellos,sellosMax);
    // QR con código interno — solo legible por la app Dopamina
    genQR(`DOPI-${c.id}`);
    document.getElementById('chip-visitas').textContent=visitas+' visita'+(visitas!==1?'s':'');
    document.getElementById('chip-sellos').textContent=sellos+'/'+sellosMax+' sellos';
    if(sellos>=sellosMax)document.getElementById('chip-gratis').style.display='flex';
    setTimeout(()=>{
      document.getElementById('loader').classList.add('hide');
      document.getElementById('card-scene').style.display='block';
      document.getElementById('flip-hint').style.display='flex';
      document.getElementById('info-bar').style.display='flex';
    },700);
  }catch(e){
    console.error(e);
    document.getElementById('loader').classList.add('hide');
    document.getElementById('error-view').style.display='block';
  }
}
init();
</script>
</body>
</html>
